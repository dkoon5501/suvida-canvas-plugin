name: Deploy to Canvas Sandbox

on:
  workflow_dispatch:
  push:
    branches:
      - claude/deploy-canvas-sandbox-3hzSl
    paths:
      - 'plugins/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/deploy-canvas-sandbox-3hzSl

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Canvas SDK
        run: pip install canvas==0.135.0

      - name: Write credentials
        env:
          CANVAS_CLIENT_ID: ${{ secrets.CANVAS_CLIENT_ID }}
          CANVAS_CLIENT_SECRET: ${{ secrets.CANVAS_CLIENT_SECRET }}
        run: |
          mkdir -p ~/.canvas && chmod 700 ~/.canvas
          printf '[xpc-dev]\nclient_id = %s\nclient_secret = %s\nis_default = true\n' \
            "$CANVAS_CLIENT_ID" "$CANVAS_CLIENT_SECRET" > ~/.canvas/credentials.ini
          chmod 600 ~/.canvas/credentials.ini
          echo "credentials.ini written, sections: $(python3 -c "import configparser; c=configparser.ConfigParser(); c.read('$HOME/.canvas/credentials.ini'); print(c.sections())")"

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Deploy plugin
        run: canvas install --host xpc-dev plugins/hedis_care_gaps
